workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npx vite build --base ./

      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Set export compliance (HTTPS only, exempt)
        script: |
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist

      - name: Generate app icon
        script: |
          # Generate square icon SVG from logo
          node scripts/generate-icon.mjs
          # Install librsvg for SVG→PNG conversion
          brew install librsvg 2>/dev/null || true
          # Convert to 1024x1024 PNG
          rsvg-convert -w 1024 -h 1024 resources/icon.svg -o resources/icon.png
          # Replace all default Capacitor icons in the asset catalog
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          if [ -d "$ICONSET" ]; then
            for f in "$ICONSET"/*.png; do
              # Get dimensions of existing icon
              W=$(sips -g pixelWidth "$f" | tail -1 | awk '{print $2}')
              H=$(sips -g pixelHeight "$f" | tail -1 | awk '{print $2}')
              # Resize our icon to match and overwrite
              sips -z "$H" "$W" resources/icon.png --out "$f" > /dev/null
            done
            echo "Replaced $(ls "$ICONSET"/*.png | wc -l) app icon sizes"
          else
            echo "WARNING: AppIcon.appiconset not found"
          fi

      - name: Set development team
        script: |
          cd ios/App
          ruby -pi -e "gsub(/DEVELOPMENT_TEAM = .*?;/, \"DEVELOPMENT_TEAM = #{ENV['APPLE_TEAM_ID']};\")" App.xcodeproj/project.pbxproj
          # Also add team where it's missing (empty string)
          ruby -pi -e "gsub(/DEVELOPMENT_TEAM = \"\";/, \"DEVELOPMENT_TEAM = #{ENV['APPLE_TEAM_ID']};\")" App.xcodeproj/project.pbxproj
          echo "Team ID set to: $APPLE_TEAM_ID"
          grep -c "DEVELOPMENT_TEAM = $APPLE_TEAM_ID" App.xcodeproj/project.pbxproj || echo "WARNING: Team ID not found in pbxproj"

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.irada.app \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

      - name: Set up keychain
        script: |
          keychain initialize
          keychain add-certificates

      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) / 60))

      - name: Apply profiles to project
        script: |
          cd ios/App
          ruby -pi -e 'gsub(/CODE_SIGN_STYLE = Automatic;/, "CODE_SIGN_STYLE = Manual;")' App.xcodeproj/project.pbxproj
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App \
            --config Release

    artifacts:
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
